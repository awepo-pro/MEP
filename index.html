<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MEMM · Named Entity Recognition</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  /* ── Reset & tokens ─────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0e11;
    --surface:   #15171c;
    --border:    #252830;
    --muted:     #3d4150;
    --text:      #e8eaf0;
    --dim:       #7a7f92;
    --accent:    #f0c060;
    --person:    #ff6b6b;
    --person-bg: rgba(255,107,107,.13);
    --o-dim:     #5a5e6e;
    --glow:      rgba(240,192,96,.08);
    --radius:    10px;
    --mono:      'DM Mono', monospace;
    --serif:     'Playfair Display', serif;
    --sans:      'DM Sans', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    line-height: 1.6;
  }

  /* ── Noise grain overlay ─────────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    opacity: .5;
  }

  /* ── Layout ──────────────────────────────────────────────────────────── */
  .shell {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ── Header ──────────────────────────────────────────────────────────── */
  header {
    padding: 52px 0 36px;
    border-bottom: 1px solid var(--border);
  }
  .logo-row {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 8px;
  }
  .logo-row h1 {
    font-family: var(--serif);
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 900;
    letter-spacing: -.02em;
    color: var(--accent);
    line-height: 1;
  }
  .logo-row .chip {
    font-family: var(--mono);
    font-size: .65rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid var(--muted);
    border-radius: 4px;
    color: var(--dim);
  }
  header p {
    font-size: .9rem;
    color: var(--dim);
    max-width: 520px;
  }

  /* ── Status banner ───────────────────────────────────────────────────── */
  #status-bar {
    margin-top: 14px;
    padding: 8px 14px;
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: .78rem;
    display: none;
  }
  #status-bar.warn  { background: rgba(255,180,50,.1);  border:1px solid rgba(255,180,50,.25); color:#ffb432; display:block; }
  #status-bar.error { background: rgba(255,80, 80,.1);  border:1px solid rgba(255,80, 80,.25); color:#ff5050; display:block; }
  #status-bar.ok    { background: rgba(50, 200,100,.1); border:1px solid rgba(50,200,100,.25); color:#32c864; display:block; }

  /* ── Main area ───────────────────────────────────────────────────────── */
  main {
    padding: 40px 0;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* ── Input panel ─────────────────────────────────────────────────────── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .panel-head {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: .7rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--dim);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-head .dot-row { display: flex; gap: 6px; }
  .dot-row span {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--muted);
  }
  .dot-row span:nth-child(1) { background:#ff6058; }
  .dot-row span:nth-child(2) { background:#ffbd2e; }
  .dot-row span:nth-child(3) { background:#28c840; }

  textarea {
    width: 100%;
    min-height: 160px;
    resize: vertical;
    background: transparent;
    border: none;
    outline: none;
    padding: 20px 20px 16px;
    font-family: var(--mono);
    font-size: .88rem;
    color: var(--text);
    line-height: 1.7;
    caret-color: var(--accent);
  }
  textarea::placeholder { color: var(--muted); }
  textarea:focus { background: rgba(255,255,255,.015); }

  /* ── Controls ────────────────────────────────────────────────────────── */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 14px 18px;
    border-top: 1px solid var(--border);
  }
  .btn {
    cursor: pointer;
    border: none;
    border-radius: 6px;
    font-family: var(--sans);
    font-weight: 500;
    font-size: .85rem;
    padding: 9px 22px;
    transition: all .18s ease;
    letter-spacing: .01em;
  }
  .btn-primary {
    background: var(--accent);
    color: #0d0e11;
  }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .btn-ghost {
    background: transparent;
    color: var(--dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
  .char-count {
    margin-left: auto;
    font-family: var(--mono);
    font-size: .72rem;
    color: var(--muted);
  }

  /* ── Spinner ─────────────────────────────────────────────────────────── */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(240,192,96,.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner.active { display: inline-block; }

  /* ── Output panel ────────────────────────────────────────────────────── */
  #output-panel {
    display: none;
    animation: fadeUp .3s ease;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(12px); }
    to   { opacity:1; transform: translateY(0); }
  }
  #output-panel.visible { display: block; }

  .token-stream {
    padding: 20px 20px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px 4px;
    line-height: 1;
  }

  .token {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-family: var(--mono);
    font-size: .82rem;
  }
  .token .word {
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid transparent;
    transition: all .15s;
  }
  .token .tag {
    font-size: .58rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    font-weight: 500;
    height: 10px;
    line-height: 1;
  }

  .token.PERSON .word {
    background: var(--person-bg);
    border-color: rgba(255,107,107,.3);
    color: var(--person);
    font-weight: 500;
  }
  .token.PERSON .tag { color: var(--person); }
  .token.O .word { color: var(--o-dim); }
  .token.O .tag  { color: transparent; }   /* hide O labels by default */

  .token.PERSON .word:hover {
    background: rgba(255,107,107,.22);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(255,107,107,.2);
  }

  /* ── Legend & stats ──────────────────────────────────────────────────── */
  .output-foot {
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 18px;
    font-size: .75rem;
    color: var(--dim);
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
  }
  .legend-dot {
    width: 8px; height: 8px; border-radius: 2px;
  }
  .stat { font-family: var(--mono); }
  .stat strong { color: var(--accent); }

  /* ── Toggle labels ───────────────────────────────────────────────────── */
  .toggle-wrap {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
    font-size: .75rem;
    color: var(--dim);
    cursor: pointer;
    user-select: none;
  }
  .toggle {
    width: 32px; height: 17px;
    background: var(--muted);
    border-radius: 9px;
    position: relative;
    transition: background .2s;
  }
  .toggle::after {
    content:'';
    position: absolute;
    top: 2px; left: 2px;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: #fff;
    transition: transform .2s;
  }
  .toggle.on { background: var(--accent); }
  .toggle.on::after { transform: translateX(15px); }

  body.show-all-tags .token.O .tag { color: var(--muted); }

  /* ── Footer ──────────────────────────────────────────────────────────── */
  footer {
    padding: 20px 0;
    border-top: 1px solid var(--border);
    font-size: .73rem;
    color: var(--muted);
    font-family: var(--mono);
    display: flex;
    justify-content: space-between;
  }

  /* ── Responsive ──────────────────────────────────────────────────────── */
  @media(max-width:600px) {
    .controls { flex-wrap: wrap; }
    .char-count { margin-left: 0; order: -1; width: 100%; }
  }
</style>
</head>
<body>

<div class="shell">
  <header>
    <div class="logo-row">
      <h1>MEMM</h1>
      <span class="chip">NER · Person Detection</span>
    </div>
    <p>Maximum Entropy Markov Model — paste any text below and the model will identify <em>person</em> named entities using the Viterbi algorithm.</p>
    <div id="status-bar"></div>
  </header>

  <main>
    <!-- Input -->
    <div class="panel">
      <div class="panel-head">
        <div class="dot-row"><span></span><span></span><span></span></div>
        <span>input.txt</span>
      </div>
      <textarea id="input-text" placeholder="Paste or type text here…
e.g. Barack Obama met with Angela Merkel in Berlin on Monday."
                spellcheck="false" maxlength="8000"></textarea>
      <div class="controls">
        <button class="btn btn-primary" id="analyze-btn" onclick="analyze()">Analyze</button>
        <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
        <div class="spinner" id="spinner"></div>
        <span class="char-count" id="char-count">0 / 8000</span>
      </div>
    </div>

    <!-- Output -->
    <div class="panel" id="output-panel">
      <div class="panel-head">
        <div class="dot-row"><span></span><span></span><span></span></div>
        <span>results</span>
      </div>
      <div class="token-stream" id="token-stream"></div>
      <div class="output-foot">
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--person);"></div>
          <span>PERSON</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--muted);"></div>
          <span>Other (O)</span>
        </div>
        <span class="stat" id="stats"></span>
        <label class="toggle-wrap" id="tag-toggle" title="Show all labels">
          <span>All labels</span>
          <div class="toggle" id="toggle-el"></div>
        </label>
      </div>
    </div>
  </main>

  <footer>
    <span>MEMM · MaxEnt + Viterbi</span>
    <span id="timing"></span>
  </footer>
</div>

<script>
const textarea  = document.getElementById('input-text');
const charCount = document.getElementById('char-count');
const spinner   = document.getElementById('spinner');
const analyzeBtn= document.getElementById('analyze-btn');
const statusBar = document.getElementById('status-bar');
const outputPanel=document.getElementById('output-panel');
const tokenStream=document.getElementById('token-stream');
const statsEl   = document.getElementById('stats');
const timingEl  = document.getElementById('timing');
const toggleEl  = document.getElementById('toggle-el');

/* ── char counter ─────────────────────────────────────────────────────── */
textarea.addEventListener('input', () => {
  charCount.textContent = `${textarea.value.length} / 8000`;
});

/* ── label toggle ─────────────────────────────────────────────────────── */
let showAll = false;
document.getElementById('tag-toggle').addEventListener('click', () => {
  showAll = !showAll;
  toggleEl.classList.toggle('on', showAll);
  document.body.classList.toggle('show-all-tags', showAll);
});

/* ── status helper ────────────────────────────────────────────────────── */
function setStatus(msg, type='warn') {
  statusBar.textContent = msg;
  statusBar.className = type;
}
function clearStatus() {
  statusBar.className = '';
  statusBar.textContent = '';
}

/* ── health check on load ─────────────────────────────────────────────── */
async function checkHealth() {
  try {
    const r = await fetch('/health');
    const d = await r.json();
    if (!d.ok) setStatus('⚠ ' + (d.error || 'Model not loaded'), 'warn');
    else        clearStatus();
  } catch(e) {
    setStatus('Cannot reach the API server.', 'error');
  }
}
checkHealth();

/* ── analyze ──────────────────────────────────────────────────────────── */
async function analyze() {
  const text = textarea.value.trim();
  if (!text) {
    setStatus('Please enter some text first.', 'warn');
    return;
  }
  clearStatus();
  spinner.classList.add('active');
  analyzeBtn.disabled = true;
  const t0 = performance.now();

  try {
    const res = await fetch('/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text })
    });
    const data = await res.json();
    const elapsed = ((performance.now() - t0) / 1000).toFixed(2);

    if (data.error) {
      setStatus('Error: ' + data.error, 'error');
      return;
    }

    renderTokens(data.tokens);
    timingEl.textContent = `${elapsed}s · ${data.tokens.length} tokens`;

  } catch(e) {
    setStatus('Network error: ' + e.message, 'error');
  } finally {
    spinner.classList.remove('active');
    analyzeBtn.disabled = false;
  }
}

/* ── render ───────────────────────────────────────────────────────────── */
function renderTokens(tokens) {
  tokenStream.innerHTML = '';
  let personCount = 0;

  tokens.forEach(({ word, label }) => {
    const isPerson = label === 'PERSON';
    if (isPerson) personCount++;

    const el = document.createElement('span');
    el.className = `token ${label}`;

    const wordEl = document.createElement('span');
    wordEl.className = 'word';
    wordEl.textContent = word;

    const tagEl = document.createElement('span');
    tagEl.className = 'tag';
    tagEl.textContent = label;

    el.append(wordEl, tagEl);
    tokenStream.appendChild(el);
  });

  statsEl.innerHTML = `<strong>${personCount}</strong> person${personCount !== 1 ? 's' : ''} found`;
  outputPanel.classList.add('visible');
}

/* ── clear ────────────────────────────────────────────────────────────── */
function clearAll() {
  textarea.value = '';
  charCount.textContent = '0 / 8000';
  tokenStream.innerHTML = '';
  outputPanel.classList.remove('visible');
  clearStatus();
  timingEl.textContent = '';
}

/* ── keyboard shortcut Ctrl/Cmd+Enter ────────────────────────────────── */
textarea.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyze();
});
</script>
</body>
</html>
